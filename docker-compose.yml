services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-cart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: smartcart_dev
      POSTGRES_DB: smartcart
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    container_name: smart-cart-server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://smartcart:smartcart_dev@postgres:5432/smartcart}

  client:
    build:
      context: ./
      dockerfile: ./client/Dockerfile
    container_name: smart-cart-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8081}:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}

volumes:
  pgdata:
