services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-cart-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: smartcart_dev
      POSTGRES_DB: smartcart
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
